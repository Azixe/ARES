<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARES</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header id="header">
        <div class="header-left">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
                    <line x1="12" y1="2" x2="12" y2="22"/>
                    <line x1="2" y1="8.5" x2="22" y2="8.5"/>
                    <line x1="2" y1="15.5" x2="22" y2="15.5"/>
                </svg>
                <span class="logo-text">ARES</span>
            </div>
            <span class="version-badge">v0.1</span>
        </div>
        <div class="header-right">
            <div class="status-indicator" id="status-indicator">
                <div class="status-dot" id="status-dot"></div>
                <span class="status-text" id="status-text">Initializing</span>
            </div>
            <button class="btn-icon" id="btn-clear" title="Clear conversation">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3,6 5,6 21,6"/>
                    <path d="M19,6V20a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6M8,6V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2V6"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- ===== CHAT AREA ===== -->
    <main id="chat-area">
        <!-- Welcome screen (shown when no messages) -->
        <div id="welcome" class="welcome-screen">
            <div class="welcome-hex">
                <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                    <polygon points="12,2 22,8.5 22,15.5 12,22 2,15.5 2,8.5"/>
                    <line x1="12" y1="2" x2="12" y2="22"/>
                    <line x1="2" y1="8.5" x2="22" y2="8.5"/>
                    <line x1="2" y1="15.5" x2="22" y2="15.5"/>
                </svg>
            </div>
            <h2 class="welcome-title">ARES Online</h2>
            <p class="welcome-subtitle">Adaptive Reasoning Executive System</p>
            <p class="welcome-prompt">State your objective.</p>
        </div>

        <!-- Messages container -->
        <div id="messages"></div>
    </main>

    <!-- ===== INPUT AREA ===== -->
    <footer id="input-area">
        <div class="input-container">
            <textarea
                id="message-input"
                placeholder="State your objective..."
                rows="1"
                autocomplete="off"
                spellcheck="true"
            ></textarea>
            <button id="btn-send" title="Send message" disabled>
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22,2 15,22 11,13 2,9"/>
                </svg>
            </button>
        </div>
        <div class="input-meta">
            <span id="model-info" class="meta-tag">—</span>
            <span id="turn-count" class="meta-tag">0 turns</span>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
